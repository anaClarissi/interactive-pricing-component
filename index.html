<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css, javascript">
  <meta name="description" content="Interactive Pricing Component Website">
  <meta name="author" content="Ana Clarissi">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive pricing component</title>

  <link rel="stylesheet" href="./src/css/style.css">
  
</head>
<body>

  <main id="main">

    <div class="container">

      <header class="container--header">

        <h1 class="title">Simple, traffic-based pricing</h1>

        <p class="subtitle">Sign-up for our 30-day trial. No credit card required.</p>

      </header>

      <div class="container--card">

        <div class="card-body">

          <h2 class="title" ><span id="page-views"></span> Pageviews</h2>

          <input type="range" name="page-range" id="page-range">

          <div class="view-price-content">

            <span id="view-price"></span>

            <span id="billing">$ /month</span>

          </div>

          <div class="billing-content">

            <p>Monthly Billing</p>

            <label class="switch">

              <input type="checkbox" name="switch-billing" id="switch-billing">

              <span class="slider"></span>

            </label>

            <p>Yearly Billing <span class="discount"> <span class="discount--symbol">-</span> 25% <span class="discount--text">discount</span></span></p>

          </div>

        </div>

        <div class="card-footer">

          <ul class="card-list">

            <li class="card-list--item">Unlimited websites</li>
            <li class="card-list--item">100% data ownership</li>
            <li class="card-list--item">Email reports</li>

          </ul>

          <button type="button" class="start-btn">Start my trial</button>

        </div>

      </div>

    </div>

  </main>
  

</body>
</html>
